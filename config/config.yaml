app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false                        # 修复了拼写错误
  preset: "morning_evening"

platforms:
  enabled: true                         # 开启热榜匹配
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # 权威财经与快讯
    - id: "cls-telegraph"
      name: "财联社-电报"
      url: "https://rsshub.app/cls/telegraph"
      max_age_days: 2
    - id: "yicai"
      name: "第一财经"
      url: "https://rsshub.app/yicai/latest"
      max_age_days: 2
    - id: "jiemian"
      name: "界面新闻"
      url: "https://rsshub.app/jiemian/lists/8"
      max_age_days: 2

    # 传统门户汽车/财经频道
    - id: "sina-auto"
      name: "新浪汽车"
      url: "https://rsshub.app/sina/roll/auto"
      max_age_days: 2
    - id: "sina-finance"
      name: "新浪财经"
      url: "https://rsshub.app/sina/finance/auto"
      max_age_days: 2

    # 汽车行业权威垂直媒体
    - id: "gasgoo"
      name: "盖世汽车"
      url: "https://rsshub.app/gasgoo/news"
      max_age_days: 2
    - id: "autohome"
      name: "汽车之家-行业"
      url: "https://rsshub.app/autohome/news/all"
      max_age_days: 2

    # 头部商业与科技媒体
    - id: "36kr"
      name: "36氪"
      url: "https://36kr.com/feed"
      max_age_days: 2
    - id: "tmtpost"
      name: "钛媒体"
      url: "https://rsshub.app/tmtpost/default"
      max_age_days: 2
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://rsshub.app/wallstreetcn/news/global"
      max_age_days: 2

    # 顶尖深度商业
    - id: "latepost"
      name: "晚点LatePost"
      url: "https://rsshub.app/latepost/index"
      max_age_days: 2
    - id: "caixin-latest"
      name: "财新网-最新"
      url: "https://rsshub.app/caixin/latest"
      max_age_days: 2
    - id: "eeo-auto"
      name: "经济观察网-汽车频道"
      url: "https://rsshub.app/eeo/17"
      max_age_days: 2

    # 硬核前沿科技
    - id: "jiqizhixin"
      name: "机器之心"
      url: "https://rsshub.app/jiqizhixin/latest"
      max_age_days: 2
    - id: "leiphone-auto"
      name: "雷锋网-智能驾驶"
      url: "https://rsshub.app/leiphone/category/auto"
      max_age_days: 2

    # 新能源纯垂直媒体
    - id: "cheyun"
      name: "车云网"
      url: "https://rsshub.app/cheyun/index"
      max_age_days: 2
    - id: "evhui"
      name: "电车汇"
      url: "https://rsshub.app/evhui/news"
      max_age_days: 2
    - id: "d1ev"
      name: "第一电动网"
      url: "https://rsshub.app/d1ev/news"
      max_age_days: 2

    # 储能、电池与新能源材料
    - id: "bjx-chuneng"
      name: "北极星储能网"
      url: "https://rsshub.app/bjx/chuneng/yw"
      max_age_days: 2
    - id: "thepaper-energy"
      name: "澎湃新闻-能源与双碳"
      url: "https://rsshub.app/thepaper/channel/25953"
      max_age_days: 2
    - id: "jiemian-energy"
      name: "界面新闻-新能源"
      url: "https://rsshub.app/jiemian/lists/84"
      max_age_days: 2
    - id: "cls-energy"
      name: "财联社-新能源深度"
      url: "https://rsshub.app/cls/depth/1003"
      max_age_days: 2
    - id: "36kr-energy"
      name: "36氪-新能源与双碳"
      url: "https://rsshub.app/36kr/motif/32768"
      max_age_days: 2

report:
  mode: "daily"                       # 使用全天汇总模式，积累丰富新闻
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"
  priority_sort_enabled: false

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false                 # 彻底关闭独立展示区，防止垃圾新闻
    ai_analysis: false
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
