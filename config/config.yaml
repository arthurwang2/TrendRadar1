app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "ifeng"
      name: "凤凰网"
    - id: "toutiao"
      name: "今日头条"
    - id: "tencent-hot"
      name: "腾讯新闻"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2  # 全局默认：只看24小时内的新闻
  feeds:
    # --- 🎯 新增：央视与官媒直达 ---
    - id: "cctv-news"
      name: "央视与官媒"
      url: "https://www.bing.com/news/search?q=site:news.cctv.com+OR+site:xinhuanet.com+OR+site:people.com.cn&format=RSS"

    # --- 🎯 车企官网 (特批放宽至 10 天) ---
    - id: "tesla-news"
      name: "特斯拉动态"
      url: "https://finance.yahoo.com/rss/headline?s=TSLA"
      max_age_days: 10
    - id: "nio-official"
      name: "官网-蔚来"
      url: "https://ir.nio.com/rss/news-releases.xml"
      max_age_days: 10
    - id: "lixiang-official"
      name: "官网-理想"
      url: "https://ir.lixiang.com/rss/news-releases.xml"
      max_age_days: 10
    - id: "xpeng-official"
      name: "官网-小鹏"
      url: "https://ir.xiaopeng.com/rss/news-releases.xml"
      max_age_days: 10

    # --- 🎯 车贷、财政与友商政策源 ---
    - id: "bing-car-loan"
      name: "Bing-车贷与金融"
      url: "https://www.bing.com/news/search?q=汽车金融+OR+车贷+OR+车企免息&format=RSS"
    - id: "bing-gov-subsidy"
      name: "Bing-政府汽车补贴"
      url: "https://www.bing.com/news/search?q=汽车+财政+补贴+以旧换新+购置税&format=RSS"
    - id: "bing-ev-policy"
      name: "Bing-车企政策与降价"
      url: "https://www.bing.com/news/search?q=新能源车+降价+免息+权益+优惠&format=RSS"
    
    # --- 🎯 原有财经源 ---
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://rsshub.rssforever.com/wallstreetcn/news/global"
    - id: "cls-telegraph-rss"
      name: "财联社-电报"
      url: "https://rsshub.rssforever.com/cls/telegraph"

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - ai_analysis
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: true

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: true

ai_translation:
  enabled: false
