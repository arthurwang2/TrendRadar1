app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false

platforms:
  enabled: true
  sources:
    # === 综合新闻媒体类 ===
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "ifeng"
      name: "凤凰网"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "tencent-hot"
      name: "腾讯新闻"
    # === 财经投资类 ===
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"
    # === 社交/短视频/科技类 ===
    - id: "weibo"
      name: "微博"
    - id: "zhihu"
      name: "知乎"
    - id: "bilibili-hot-search"
      name: "B站"
    - id: "ithome"
      name: "IT之家"
    - id: "36kr"
      name: "36氪"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    # --- 🎯 权威官媒与地方政务 (原生直连，信息量大且稳定) ---
    - id: "shanghai-gov"
      name: "上海市政府"
      url: "https://rsshub.rssforever.com/gov/shanghai/rsj/zxxw"
    - id: "shanghai-sheitc"
      name: "上海经信委"
      url: "https://rsshub.rssforever.com/gov/shanghai/sheitc/zxgkxx"
    - id: "xinhua-news"
      name: "新华网要闻"
      url: "https://rsshub.rssforever.com/xinhua/news/yw"
    - id: "cctv-news"
      name: "央视新闻"
      url: "https://rsshub.rssforever.com/cctv/news/china"

    # --- 🎯 汽车与科技前沿 (垂直媒体，新车/降价/公关动态极多) ---
    - id: "ithome-auto"
      name: "IT之家-汽车"
      url: "https://rsshub.rssforever.com/ithome/it/auto"
    - id: "36kr-auto"
      name: "36氪-汽车"
      url: "https://rsshub.rssforever.com/36kr/motif/32768675840"
    - id: "qbitai"
      name: "量子位-AI"
      url: "https://rsshub.rssforever.com/qbitai/category/资讯"

    # --- 🎯 车贷与宏观金融 (7x24小时全天候滚动) ---
    - id: "sina-finance"
      name: "新浪财经"
      url: "https://rsshub.rssforever.com/sina/finance/roll"

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 2     # ⚠️ 同一个话题最多只留 2 条，拒绝同质化刷屏

filter:
  method: "keyword"           # ⚠️ 换回最稳定精准的关键词模式
  priority_sort_enabled: true

display:
  region_order:
    - ai_analysis
    - hotlist
    - rss
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false         # ⚠️ 关闭独立展示区，彻底干掉微博八卦
    ai_analysis: true

notification:
  enabled: true
  channels:
    bark:
      url: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true
  include_standalone: false

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: true
    rss: true
    standalone: false

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
