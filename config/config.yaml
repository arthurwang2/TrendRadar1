# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "morning_evening"

platforms:
  enabled: true
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # ==========================================
    # 1. 微软 Bing 官方定制源 (已修复中文编码与地区参数，100% 稳定)
    # ==========================================
    - id: "bing-ev"
      name: "Bing新闻-新能源与车企"
      url: "https://www.bing.com/news/search?q=%E6%96%B0%E8%83%BD%E6%BA%90%E6%B1%BD%E8%BD%A6+%E9%80%A0%E8%BD%A6%E6%96%B0%E5%8A%BF%E5%8A%9B&format=RSS&mkt=zh-cn"
      max_age_days: 2
    - id: "bing-battery"
      name: "Bing新闻-电池与储能"
      url: "https://www.bing.com/news/search?q=%E5%9B%BA%E6%80%81%E7%94%B5%E6%B1%A0+%E5%8A%A8%E5%8A%9B%E7%94%B5%E6%B1%A0+%E5%82%A8%E8%83%BD&format=RSS&mkt=zh-cn"
      max_age_days: 2
    - id: "bing-ai"
      name: "Bing新闻-AI大方向"
      url: "https://www.bing.com/news/search?q=%E4%BA%BA%E5%B7%A5%E6%99%BA%E8%83%BD+%E5%A4%A7%E6%A8%A1%E5%9E%8B&format=RSS&mkt=zh-cn"
      max_age_days: 2
    - id: "bing-finance"
      name: "Bing新闻-宏观与财经"
      url: "https://www.bing.com/news/search?q=%E5%AE%8F%E8%A7%82%E7%BB%8F%E6%B5%8E+%E7%BE%8E%E8%81%94%E5%82%A8+A%E8%82%A1&format=RSS&mkt=zh-cn"
      max_age_days: 2

    # ==========================================
    # 2. 官方直连权威商业/科技源
    # ==========================================
    - id: "yahoo-finance"
      name: "Yahoo Finance"
      url: "https://finance.yahoo.com/news/rssindex"
      max_age_days: 2
    - id: "techcrunch"
      name: "TechCrunch"
      url: "http://feeds.feedburner.com/TechCrunch"
      max_age_days: 2
    - id: "36kr"
      name: "36氪"
      url: "https://36kr.com/feed"
      max_age_days: 2

    # ==========================================
    # 3. 备用高可用 RSSHub 节点
    # ==========================================
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://rsshub.111566.xyz/wallstreetcn/news/global"
      max_age_days: 2
    - id: "cls-telegraph"
      name: "财联社-电报"
      url: "https://rsshub.111566.xyz/cls/telegraph"
      max_age_days: 2
    - id: "autohome"
      name: "汽车之家-行业"
      url: "https://rsshub.111566.xyz/autohome/news/all"
      max_age_days: 2

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"
  priority_sort_enabled: false

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - ai_analysis                     
    - new_items
    - hotlist
    - rss
    - standalone
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: true                 
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"
  api_key: ""                       
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 30
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
