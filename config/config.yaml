report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"
  priority_sort_enabled: false

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - ai_analysis                     # 将 AI 分析提到了最前面
    - new_items
    - hotlist
    - rss
    - standalone
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: true                 # 开启 AI 分析显示区域
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "Qwen/Qwen2.5-7B-Instruct"
  api_key: ""                       # 💡 Taiwei，请将你的 DeepSeek 或 OpenAI API Key 填在双引号内，例如 "sk-xxxxxx"
  api_base: "https://api.siliconflow.cn/v1"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
