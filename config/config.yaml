# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "morning_evening"

platforms:
  enabled: true
  sources:
    # === 权威官媒与综合新闻 ===
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "zaobao"
      name: "联合早报"
    - id: "ifeng"
      name: "凤凰网"
    - id: "toutiao"
      name: "今日头条"
    - id: "tencent-hot"
      name: "腾讯新闻"

    # === 顶级财经与投资 ===
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "cls-telegraph"
      name: "财联社电报"
    - id: "xueqiu"
      name: "雪球"

    # === 极客与前沿科技 ===
    - id: "hackernews"
      name: "Hacker News"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # === 1. Bing 官方英文关键词源 (稳定不报错) ===
    - id: "bing-ev"
      name: "Bing新闻-新能源与车企"
      url: "https://www.bing.com/news/search?q=electric+vehicle+BYD+Tesla+NEV&format=RSS"
      max_age_days: 2
    - id: "bing-battery"
      name: "Bing新闻-电池与储能"
      url: "https://www.bing.com/news/search?q=solid+state+battery+energy+storage+CATL&format=RSS"
      max_age_days: 2
    - id: "bing-ai"
      name: "Bing新闻-AI大方向"
      url: "https://www.bing.com/news/search?q=artificial+intelligence+LLM+Nvidia+DeepSeek&format=RSS"
      max_age_days: 2
    - id: "bing-finance"
      name: "Bing新闻-宏观财经"
      url: "https://www.bing.com/news/search?q=Federal+Reserve+economy+stock+market&format=RSS"
      max_age_days: 2

    # === 2. 官方直连权威源 ===
    - id: "yahoo-finance"
      name: "Yahoo Finance"
      url: "https://finance.yahoo.com/news/rssindex"
      max_age_days: 2
    - id: "techcrunch"
      name: "TechCrunch"
      url: "http://feeds.feedburner.com/TechCrunch"
      max_age_days: 2
    - id: "36kr"
      name: "36氪"
      url: "https://36kr.com/feed"
      max_age_days: 2

    # === 3. RSSHub 镜像源 ===
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://rsshub.rssforever.com/wallstreetcn/news/global"
      max_age_days: 2
    - id: "cls-telegraph-rss"
      name: "财联社-电报"
      url: "https://rsshub.rssforever.com/cls/telegraph"
      max_age_days: 2
    - id: "autohome"
      name: "汽车之家-行业"
      url: "https://rsshub.rssforever.com/autohome/news/all"
      max_age_days: 2

report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "keyword"                   # ⚠️ 已修改：必须用 keyword 模式，你的 frequency_words.txt 才会生效！
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - ai_analysis
    - new_items
    - hotlist
    - rss
    - standalone
  regions:
    new_items: false
    hotlist: true
    rss: true
    standalone: false
    ai_analysis: true
  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "openai/Qwen/Qwen2.5-7B-Instruct"    # ⚠️ 已修改：恢复为你之前成功跑通的模型
  api_key: ""
  api_base: "https://api.siliconflow.cn/v1"   # ⚠️ 已修改：恢复为硅基流动的接口
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
